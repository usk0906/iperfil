<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipe | Udesaken</title>
    
    <link rel="stylesheet" href="https://udesaken.site/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { gold: '#C6A87C', dark: '#050505' }
                    },
                    letterSpacing: { tight: '-0.02em' }
                }
            }
        }
    </script>

    <style>
        :root {
            --brand-gold: #C6A87C;
        }
        
        /* Efeito Hover nos Cards da Equipe */
        .team-card {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .team-card:hover {
            transform: translateY(-8px);
            border-color: rgba(198, 168, 124, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(198, 168, 124, 0.1);
        }

        .card-photo-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 16px auto;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, var(--brand-gold), #4a3e2b);
            transition: all 0.4s ease;
        }

        .team-card:hover .card-photo-wrapper {
            box-shadow: 0 0 20px rgba(198, 168, 124, 0.4);
            transform: scale(1.05);
        }

        .card-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #111;
        }
    </style>
</head>
<body class="antialiased selection:bg-brand-gold/30 selection:text-white text-gray-200">

    <div class="liquid-container">
        <div class="liquid-orb orb-1"></div>
        <div class="liquid-orb orb-2"></div>
        <div class="liquid-orb orb-3"></div>
    </div>

    <nav class="fixed w-full z-50 top-0 nav-liquid transition-all duration-300">
        <div class="max-w-[1200px] mx-auto px-6 h-20 flex items-center justify-between">
            <a href="#" class="flex items-center gap-4 cursor-pointer group">
                <div class="w-9 h-9 rounded-lg overflow-hidden border border-white/10 bg-black">
                     <img src="https://udesaken.site/uskcoroa.png" alt="Logo" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition">
                </div>
                <span class="text-lg font-bold tracking-tight text-white group-hover:text-[#C6A87C] transition">
                    Udesaken <span class="text-[10px] text-gray-500 ml-1 uppercase">Equipe</span>
                </span>
            </a>
            
            <div class="flex items-center gap-6">
                <button id="theme-btn" class="theme-toggle" aria-label="Mudar Tema" style="padding: 8px;">
                    <i class="fas fa-moon text-sm"></i>
                </button>
            </div>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col items-center justify-center relative z-10 pt-28 pb-16 px-6">
        
        <div class="text-center mb-12 fade-up">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-3">Nossa <span class="text-[#C6A87C]">Equipe</span></h1>
            <p class="text-gray-400 text-sm md:text-base max-w-lg mx-auto">
                Conheça as mentes por trás da Udesaken. Clique em um perfil para saber mais.
            </p>
        </div>

        <div class="flex justify-center w-full max-w-5xl fade-up">
            
            <a href="isloch.html" class="team-card p-8 rounded-[30px] flex flex-col items-center text-center cursor-pointer group w-full max-w-sm">
                <div class="card-photo-wrapper">
                    <img src="https://udesaken.site/islo.jpg" alt="CEO Islo" class="card-photo">
                </div>
                <h2 class="text-2xl font-bold text-white group-hover:text-[#C6A87C] transition-colors mb-1">Isloch</h2>
                <p class="text-[#C6A87C] font-black text-[10px] uppercase tracking-widest">Founder, CEO & Dev</p>
            </a>

        </div>
    </section>

    <script src="https://udesaken.site/script.js"></script>
</body>
</html>
